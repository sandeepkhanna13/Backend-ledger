<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backend Ledger - Create Account</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dashboard-body">
    <!-- Navbar -->
    <nav class="navbar custom-navbar">
      <div class="container-fluid px-4">
        <div class="navbar-brand">
          <span class="logo-icon-sm">₹</span>
          Backend Ledger
        </div>
        <button
          class="btn btn-outline-light btn-sm"
          onclick="window.location.href = 'dashboard.html'"
        >
          ← Back to Dashboard
        </button>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="section-card">
            <h5 class="section-title mb-4">Create New Account</h5>
            <form id="createAccountForm">
              <div class="mb-4">
                <label class="form-label">Account Type</label>
                <select
                  class="form-select custom-input"
                  id="accountType"
                  required
                >
                  <option value="savings">Savings</option>
                  <option value="current">Current</option>
                  <option value="business">Business</option>
                </select>
              </div>
              <button type="submit" class="btn custom-btn w-100">
                Create Account
              </button>
              <div id="errorMsg" class="alert alert-danger mt-3 d-none"></div>
              <div
                id="successMsg"
                class="alert alert-success mt-3 d-none"
              ></div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API = "https://backend-ledger-kf14.onrender.com";
      const token = localStorage.getItem("token");
      if (!token) window.location.href = "login.html";

      document
        .getElementById("createAccountForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const accountType = document.getElementById("accountType").value;
          const errorMsg = document.getElementById("errorMsg");
          const successMsg = document.getElementById("successMsg");

          try {
            const res = await fetch(`${API}/api/accounts/`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({ accountType }),
            });
            const data = await res.json();

            if (!res.ok) {
              errorMsg.textContent =
                data.message || "Failed to create account!";
              errorMsg.classList.remove("d-none");
              successMsg.classList.add("d-none");
              return;
            }

            successMsg.textContent = `✅ Account created! ID: ${data.account._id}`;
            successMsg.classList.remove("d-none");
            errorMsg.classList.add("d-none");
            setTimeout(() => (window.location.href = "dashboard.html"), 2000);
          } catch (err) {
            errorMsg.textContent = "Server error. Please try again.";
            errorMsg.classList.remove("d-none");
          }
        });
    </script>
  </body>
</html>
