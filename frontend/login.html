<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backend Ledger - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-body">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-icon">₹</div>
          <h1>Backend Ledger</h1>
          <p>Your Financial Command Center</p>
        </div>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control custom-input"
              id="email"
              placeholder="you@example.com"
              required
            />
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control custom-input"
              id="password"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100 custom-btn">
            Login
          </button>
          <div id="errorMsg" class="alert alert-danger mt-3 d-none"></div>
        </form>
        <div class="auth-footer">
          Don't have an account? <a href="register.html">Register here</a>
        </div>
      </div>
    </div>

    <script>
      const API = "https://backend-ledger-kf14.onrender.com";

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const errorMsg = document.getElementById("errorMsg");

          try {
            const res = await fetch(`${API}/api/auth/login`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });
            const data = await res.json();

            if (!res.ok) {
              errorMsg.textContent = data.message || "Login failed!";
              errorMsg.classList.remove("d-none");
              return;
            }

            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
            window.location.href = "dashboard.html";
          } catch (err) {
            errorMsg.textContent = "Server error. Please try again.";
            errorMsg.classList.remove("d-none");
          }
        });
    </script>
  </body>
</html>
